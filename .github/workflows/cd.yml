name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env: DATABASE_URL ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build app
        run: ./scripts/buildprod.sh

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build docker image
        run: gcloud builds submit --tag europe-southwest1-docker.pkg.dev/corded-palisade-501118-e7/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-southwest1-docker.pkg.dev/corded-palisade-501118-e7/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project corded-palisade-501118-e7 --max-instances=4

      - name: Migrate Database up
        run: ./scripts/migrateup.sh
